services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    volumes:
      - testdata:/var/lib/postgresql/data # 네임드 볼륨
    ports:
      - "5432:5432"

volumes:
  testdata:


